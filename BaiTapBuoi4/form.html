<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form
      action="https://api-gateway.f8.edu.vn/action_page.php"
      method="post"
      enctype="multipart/form-data"
    >
      <fieldset>
        <legend>Thông tin cơ bản</legend>

        <div>
          <label for="fullname">Họ và tên:</label><br />
          <input
            type="text"
            id="fullname"
            name="fullname"
            required
            placeholder="Nguyễn Văn A"
            autofocus
            tabindex="1"
          />
        </div>

        <div>
          <label for="email">Email:</label><br />
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="example@gmail.com"
            tabindex="2"
          />
        </div>

        <div>
          <label for="password">Mật khẩu:</label><br />
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="6"
            autocomplete="off"
            tabindex="3"
          />
        </div>

        <div>
          <label for="confirm_password">Nhập lại mật khẩu:</label><br />
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
            tabindex="4"
          />
        </div>

        <div>
          <label for="phone">Số điện thoại:</label><br />
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="0xxxxxxxxx"
            pattern="0[0-9]{9}"
            tabindex="5"
          />
        </div>

        <div>
          <label for="birthday">Ngày sinh:</label><br />
          <input
            type="date"
            id="birthday"
            name="birthday"
            required
            tabindex="6"
          />
        </div>

        <div>
          <label for="age">Tuổi:</label><br />
          <input
            type="number"
            id="age"
            name="age"
            min="1"
            max="120"
            tabindex="7"
          />
        </div>

        <div>
          <label for="website">Website cá nhân:</label><br />
          <input
            type="url"
            id="website"
            name="website"
            placeholder="https://..."
            tabindex="8"
          />
        </div>

        <div>
          <label for="address">Địa chỉ:</label><br />
          <input
            type="text"
            id="address"
            name="address"
            placeholder="Số nhà, đường, phường/xã"
            tabindex="9"
          />
        </div>

        <div>
          <label for="zipcode">Mã bưu chính:</label><br />
          <input
            type="text"
            id="zipcode"
            name="zipcode"
            maxlength="6"
            placeholder="700000"
            value="ZC-0001"
            readonly
            tabindex="10"
          />
          <!--           
            readonly: hiển thị mã học viên cho người dùng xem nhưng không cho
            sửa, và giá trị này vẫn được gửi lên server khi submit form -->
        </div>

        <div>
          <label for="demo-disabled">Demo disabled:</label><br />
          <input
            type="text"
            id="demo-disabled"
            value="đây là ví dụ cho disabled"
            disabled
          />
          <!-- disabled dùng để vô hiệu hóa thẻ input bao gồm cả dữ liệu có sẵn bên
            trong -->
        </div>
      </fieldset>

      <fieldset>
        <legend>Thông tin bổ sung</legend>

        <div>
          <p>Giới tính:</p>
          <input
            type="radio"
            id="male"
            name="gender"
            value="Nam"
            required
            tabindex="11"
          />
          <label for="male">Nam</label>

          <input
            type="radio"
            id="female"
            name="gender"
            value="Nữ"
            tabindex="12"
          />
          <label for="female">Nữ</label>

          <input
            type="radio"
            id="other"
            name="gender"
            value="Khác"
            tabindex="13"
          />
          <label for="other">Khác</label>
        </div>

        <div>
          <p>Sở thích:</p>
          <input
            type="checkbox"
            id="reading"
            name="hobby"
            value="Đọc sách"
            tabindex="14"
          />
          <label for="reading">Đọc sách</label>

          <input
            type="checkbox"
            id="music"
            name="hobby"
            value="Nghe nhạc"
            tabindex="15"
          />
          <label for="music">Nghe nhạc</label>

          <input
            type="checkbox"
            id="travel"
            name="hobby"
            value="Du lịch"
            tabindex="16"
          />
          <label for="travel">Du lịch</label>

          <input
            type="checkbox"
            id="coding"
            name="hobby"
            value="Lập trình"
            tabindex="17"
          />
          <label for="coding">Lập trình</label>

          <input
            type="checkbox"
            id="cooking"
            name="hobby"
            value="Nấu ăn"
            tabindex="18"
          />
          <label for="cooking">Nấu ăn</label>

          <input
            type="checkbox"
            id="sport"
            name="hobby"
            value="Thể thao"
            tabindex="19"
          />
          <label for="sport">Thể thao</label>
        </div>

        <div>
          <label for="education">Trình độ học vấn:</label><br />
          <select id="education" name="education" tabindex="20">
            <option value="Trung học">Trung học</option>
            <option value="Cao đẳng">Cao đẳng</option>
            <option value="Đại học">Đại học</option>
            <option value="Sau đại học">Sau đại học</option>
          </select>
        </div>

        <div>
          <label for="city">Tỉnh / Thành phố:</label><br />
          <select id="city" name="city" multiple tabindex="21">
            <option>Hà Nội</option>
            <option>TP.HCM</option>
            <option>Đà Nẵng</option>
            <option>Hải Phòng</option>
            <option>Cần Thơ</option>
            <option>Bình Dương</option>
          </select>
        </div>

        <div>
          <label for="job">Nghề nghiệp:</label><br />
          <select id="job" name="job" tabindex="22">
            <option>Học sinh</option>
            <option>Sinh viên</option>
            <option>Nhân viên văn phòng</option>
            <option>Lập trình viên</option>
            <option>Khác</option>
          </select>
        </div>

        <div>
          <p>Khoá học quan tâm:</p>
          <input
            type="checkbox"
            id="html"
            name="course"
            value="HTML-CSS"
            tabindex="23"
          />
          <label for="html">HTML-CSS</label>

          <input
            type="checkbox"
            id="js"
            name="course"
            value="JavaScript"
            tabindex="24"
          />
          <label for="js">JavaScript</label>

          <input
            type="checkbox"
            id="react"
            name="course"
            value="ReactJS"
            tabindex="25"
          />
          <label for="react">ReactJS</label>

          <input
            type="checkbox"
            id="node"
            name="course"
            value="NodeJS"
            tabindex="26"
          />
          <label for="node">NodeJS</label>

          <input
            type="checkbox"
            id="python"
            name="course"
            value="Python"
            tabindex="27"
          />
          <label for="python">Python</label>
        </div>

        <div>
          <p>Hình thức học:</p>
          <input
            type="radio"
            id="online"
            name="study_type"
            value="Online"
            tabindex="28"
          />
          <label for="online">Online</label>

          <input
            type="radio"
            id="offline"
            name="study_type"
            value="Offline"
            tabindex="29"
          />
          <label for="offline">Offline</label>
        </div>

        <div>
          <label for="bio">Giới thiệu bản thân:</label><br />
          <textarea
            id="bio"
            name="bio"
            rows="4"
            placeholder="Viết vài dòng về bản thân..."
            tabindex="30"
          ></textarea>
        </div>

        <div>
          <label for="avatar">Ảnh đại diện:</label><br />
          <input
            type="file"
            id="avatar"
            name="avatar"
            accept=".jpg,.png"
            tabindex="31"
          />
        </div>

        <div>
          <label for="cv">CV / Hồ sơ:</label><br />
          <input
            type="file"
            id="cv"
            name="cv"
            accept=".pdf,.doc,.docx"
            tabindex="32"
          />
        </div>
      </fieldset>

      <fieldset>
        <legend>Tùy chọn nâng cao</legend>

        <div>
          <label for="fav_color">Màu yêu thích:</label><br />
          <input
            type="color"
            id="fav_color"
            name="fav_color"
            value="#ff6600"
            tabindex="33"
          />
        </div>

        <div>
          <label for="satisfaction">Mức độ hài lòng (0–10):</label><br />
          <input
            type="range"
            id="satisfaction"
            name="satisfaction"
            min="0"
            max="10"
            value="5"
            tabindex="34"
          />
        </div>

        <div>
          <label for="study_time">Giờ học trong ngày:</label><br />
          <input type="time" id="study_time" name="study_time" tabindex="35" />
        </div>

        <div>
          <label for="start_month">Tháng bắt đầu học:</label><br />
          <input
            type="month"
            id="start_month"
            name="start_month"
            tabindex="36"
          />
        </div>

        <div>
          <label for="start_week">Tuần bắt đầu học:</label><br />
          <input type="week" id="start_week" name="start_week" tabindex="37" />
        </div>

        <div>
          <label for="register_at">Ngày & giờ đăng ký:</label><br />
          <input
            type="datetime-local"
            id="register_at"
            name="register_at"
            tabindex="38"
          />
        </div>

        <div>
          <label for="search_course">Tìm kiếm khóa học:</label><br />
          <input
            type="search"
            id="search_course"
            name="search_course"
            placeholder="Nhập tên khóa học..."
            tabindex="39"
          />
        </div>

        <div>
          <label for="experience">Số năm kinh nghiệm:</label><br />
          <input
            type="number"
            id="experience"
            name="experience"
            min="0"
            max="50"
            step="1"
            tabindex="40"
          />
        </div>

        <div>
          <label for="budget">Mức học phí mong muốn:</label><br />
          <input
            type="range"
            id="budget"
            name="budget"
            min="0"
            max="5000000"
            step="100000"
            value="1000000"
            tabindex="41"
          />
        </div>

        <div>
          <label for="fav_lang">Ngôn ngữ lập trình yêu thích:</label><br />
          <input
            type="text"
            id="fav_lang"
            name="fav_lang"
            placeholder="VD: JavaScript, Python..."
            tabindex="42"
          />
        </div>
      </fieldset>

      <fieldset>
        <legend>Điều khoản & Hệ thống</legend>

        <div>
          <input
            type="checkbox"
            id="agree_terms"
            name="agree_terms"
            required
            tabindex="43"
          />
          <label for="agree_terms">Tôi đồng ý với điều khoản sử dụng</label>
        </div>

        <div>
          <input
            type="checkbox"
            id="subscribe"
            name="subscribe"
            tabindex="44"
          />
          <label for="subscribe">Nhận thông báo qua email</label>
        </div>

        <div>
          <input
            type="checkbox"
            id="sms_notify"
            name="sms_notify"
            tabindex="45"
          />
          <label for="sms_notify">Nhận thông báo qua SMS</label>
        </div>

        <div>
          <label for="ref_code">Mã giới thiệu:</label><br />
          <input
            type="text"
            id="ref_code"
            name="ref_code"
            placeholder="Nhập mã nếu có"
            tabindex="46"
          />
        </div>

        <label for="course_id" hidden>Mã khoá học (ẩn)</label>
        <input type="hidden" id="course_id" name="course_id" value="F8_2024" />

        <label for="utm_source" hidden>Nguồn truy cập (ẩn)</label>
        <input
          type="hidden"
          id="utm_source"
          name="utm_source"
          value="website"
        />
      </fieldset>

      <div>
        <button type="submit" tabindex="47">Đăng kí ngay</button>
        <button type="reset" tabindex="48">Nhập lại</button>
      </div>
    </form>
  </body>
</html>

<!-- Trả lời câu hỏi trắc nghiệm -->

<!-- 
Câu 1: Sự khác nhau giữa method="get" và method="post" là gì?
- GET: gửi dữ liệu qua query string trên URL, dễ bookmark, giới hạn độ dài, không phù hợp dữ liệu nhạy cảm như mật khẩu vì nó sẽ hiển thị mật khẩu trên url.
- POST: gửi dữ liệu trong body request, không lộ trên URL, không bị giới hạn độ dài như GET, phù hợp form đăng ký/đăng nhập và các dữ liệu riêng tư.

Câu 2: Tại sao cần có enctype="multipart/form-data" khi form có upload file?
- Vì khi upload file, trình duyệt phải gửi dữ liệu theo nhiều "phần" (text + file nhị phân).
- Nếu không dùng "multipart/form-data", file sẽ không được gửi đúng định dạng, server không đọc được file.

Câu 3: Trường type="hidden" có tác dụng gì? Người dùng có thể xem được giá trị của nó không?
- Dùng để gửi dữ liệu mà user không cần nhập (ví dụ: mã khoá học, nguồn truy cập...).
- Người dùng không thấy trên giao diện, nhưng vẫn có thể xem/chỉnh nếu mở DevTools hoặc xem mã nguồn.

Câu 4: Tại sao checkbox không được check thì không gửi lên server, còn radio thì luôn gửi một giá trị?
- Checkbox: chỉ những ô được check mới xuất hiện trong form data; ô không check coi như không tồn tại.
- Radio: trong một nhóm name, nếu chọn 1 ô thì khi submit luôn gửi đúng 1 giá trị (nếu không chọn gì thì không gửi)
-> còn nếu không có trường name thì ta có thể tick hết giống checkbox.

Câu 5: Sự khác nhau giữa disabled và readonly là gì?
- disabled: input bị vô hiệu hoá hoàn toàn, không focus được, thường hiển thị mờ, và KHÔNG gửi giá trị lên server.
- readonly: chỉ khóa việc sửa giá trị, vẫn focus được, và VẪN gửi giá trị hiện tại lên server.
-->
